<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ccc;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .info { color: #666; font-size: 12px; margin-top: 12px; }
    code {
      background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
      font-size: 12px;
    }
    .test-btn {
      margin-top: 12px; padding: 6px 12px;
      background: #2563eb; color: white; border: none;
      border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .test-btn:hover { background: #1d4ed8; }
    #result { margin-top: 8px; font-size: 12px; color: #666; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>ChatGPT Gateway</h2>

  <div class="status">
    <div class="dot" id="serverDot"></div>
    <span id="serverStatus">Checking...</span>
  </div>

  <div class="status">
    <div class="dot" id="chatgptDot"></div>
    <span id="chatgptStatus">Checking...</span>
  </div>

  <div class="info">
    API: <code>POST http://localhost:18790/v1/chat/completions</code>
  </div>

  <button class="test-btn" id="testBtn">Test Connection</button>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
